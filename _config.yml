# Feature List
features                                  :

  - title: Plan Every Detail
    description: Build rich trip collections with restaurants, hotels, activities, and transport. Assign each item to a day and time slot — morning, afternoon, or evening — with the day-by-day itinerary planner.
    fontawesome_icon_name: map-marked-alt

  - title: Bring Your Crew
    description: Invite friends and family to plan together. Collaborators can add places, update bookings, and see changes in real time — powered by iCloud sync. Every trip has its own crew manifest.
    fontawesome_icon_name: users

  - title: Track Your Budget
    description: Set a trip budget and log every expense as you go. See how much you've spent, how much remains, and a full breakdown by category. Split costs evenly across your crew with Atlas Pro.
    fontawesome_icon_name: wallet

  - title: Travel Map
    description: Every completed trip pins your destination on a personal travel map. Watch your globe fill up with the countries and cities you've conquered. See your total trips, countries visited, and distance traveled.
    fontawesome_icon_name: globe

  - title: Wishlist
    description: Save dream destinations with a photo, country flag, and notes. When the time is right, turn any wishlist entry into a full trip plan in seconds — complete with dates, budget, and crew.
    fontawesome_icon_name: heart

  - title: Clip from Safari
    description: Found the perfect restaurant while browsing? Use the Atlas Share Extension to save it directly to your Wishlist or trip collection without ever leaving Safari.
    fontawesome_icon_name: share-alt

  - title: Home Screen Widget
    description: Add the Trip Countdown widget to your home screen and never lose track of how many days until your next departure.
    fontawesome_icon_name: clock

  - title: Atlas Pro
    description: Unlock unlimited trips, the interactive travel map, 10-day weather forecasts, receipt photos on expenses, expense splitting, PDF itinerary export, and direct web clipping into trips.
    fontawesome_icon_name: crown



